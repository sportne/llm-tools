# Enterprise-data assistant chat for Jira, Confluence, Bitbucket, and GitLab.
# Requires the remote service env vars used by those tools, and network access
# still must be enabled per session in the Streamlit sidebar.
llm:
  provider: custom_openai_compatible
  model_name: assistant-model
  temperature: 0.1
  api_base_url: https://llm.example.internal/v1
  timeout_seconds: 60.0
  api_key_env_var: ENTERPRISE_LLM_API_KEY
  prompt_for_api_key_if_missing: true

session:
  max_context_tokens: 24000
  max_tool_round_trips: 8
  max_tool_calls_per_round: 4
  max_total_tool_calls_per_turn: 12

tool_limits:
  max_entries_per_call: 200
  max_recursive_depth: 12
  max_search_matches: 50
  max_read_lines: 200
  max_file_size_characters: 262144
  max_read_file_chars: null
  max_tool_result_chars: 24000

policy:
  enabled_tools:
    - search_jira
    - read_jira_issue
    - search_confluence
    - read_confluence_content
    - search_bitbucket_code
    - read_bitbucket_file
    - read_bitbucket_pull_request
    - search_gitlab_code
    - read_gitlab_file
    - read_gitlab_merge_request

protection:
  enabled: false

ui:
  show_token_usage: true
  show_footer_help: true
  inspector_open_by_default: false

workspace:
  default_root: null

research:
  enabled: false

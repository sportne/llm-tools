[runtime]
"instructor" = "Structured response parsing support for OpenAI-compatible provider interactions."
"atlassian-python-api" = "Client library for bundled Jira, Confluence, and Bitbucket read integrations, which are default-hidden in the assistant behind atlassian_tools_enabled."
"argon2-cffi" = "Password hashing for the assistant app's local username/password authentication."
"cryptography" = "Authenticated encryption and key wrapping for assistant persistence."
"python-gitlab" = "Client library for bundled GitLab read integrations, which are default-hidden in the assistant behind gitlab_tools_enabled."
"sqlcipher3-wheels" = "SQLCipher-backed SQLite driver for encrypted assistant persistence."
"markitdown" = "Document-to-Markdown conversion for readable filesystem file access."
"mpxj" = "Microsoft Project file conversion support in the filesystem read pipeline."
"openai" = "OpenAI-compatible model transport and native OpenAI API client support."
"nicegui" = "Browser UI runtime for the LLM Tools Assistant app."
"ollama" = "Native Ollama provider transport for local model endpoints; assistant exposure is default-hidden behind ollama_native_provider_enabled."
"pathspec" = "Gitignore-style hidden and ignored path matching for workspace discovery."
"pydantic" = "Typed contract boundary for tool, workflow, harness, provider, app, and persistence models."
"pyyaml" = "YAML parsing for assistant configuration files and skill manifests."
"sqlalchemy" = "Synchronous database access layer for SQLCipher-backed assistant persistence."

[dev]
"build" = "Package build frontend used by the local packaging workflow."
"mypy" = "Strict static type checking for the Python package."
"pytest" = "Test runner for unit, integration, architecture, and example tests."
"pytest-cov" = "Coverage reporting integration for pytest."
"ruff" = "Formatter and linter for source and test code."
"setuptools" = "Build backend and editable-install support for the src-layout package."
"vulture" = "Dead-code review lead generation for reachability maintenance."
"wheel" = "Wheel distribution build support."

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    env:
      VENV: .venv

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Create virtual environment
        run: make setup-venv

      - name: Install project and dev dependencies
        run: make install-dev

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

      - name: Type check
        run: make typecheck

  tests:
    runs-on: ubuntu-latest

    env:
      VENV: .venv

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Create virtual environment
        run: make setup-venv

      - name: Install project and dev dependencies
        run: make install-dev

      - name: Run tests
        run: make test

  windows-tests:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  coverage:
    runs-on: ubuntu-latest

    env:
      VENV: .venv

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Create virtual environment
        run: make setup-venv

      - name: Install project and dev dependencies
        run: make install-dev

      - name: Run coverage gates
        run: make coverage

  package:
    runs-on: ubuntu-latest

    env:
      VENV: .venv

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Create virtual environment
        run: make setup-venv

      - name: Install project and dev dependencies
        run: make install-dev

      - name: Build source and wheel distributions
        run: make package

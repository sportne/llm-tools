[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"

[theme]
base = "dark"
primaryColor = "#5e93ff"
backgroundColor = "#060b14"
secondaryBackgroundColor = "#0e1626"
textColor = "#edf4ff"
borderColor = "#22324f"
baseRadius = "0.75rem"
buttonRadius = "0.75rem"
showWidgetBorder = true
showSidebarBorder = true

[theme.sidebar]
primaryColor = "#5e93ff"
backgroundColor = "#050a13"
secondaryBackgroundColor = "#0e1626"
textColor = "#edf4ff"
borderColor = "#22324f"
showWidgetBorder = true

[theme.dark]
primaryColor = "#5e93ff"
backgroundColor = "#060b14"
secondaryBackgroundColor = "#0e1626"
textColor = "#edf4ff"
borderColor = "#22324f"

[theme.dark.sidebar]
primaryColor = "#5e93ff"
backgroundColor = "#050a13"
secondaryBackgroundColor = "#0e1626"
textColor = "#edf4ff"
borderColor = "#22324f"

[theme.light]
primaryColor = "#245dff"
backgroundColor = "#edf3fb"
secondaryBackgroundColor = "#ffffff"
textColor = "#10203b"
borderColor = "#c9d6ea"

[theme.light.sidebar]
primaryColor = "#245dff"
backgroundColor = "#e5edf8"
secondaryBackgroundColor = "#ffffff"
textColor = "#10203b"
borderColor = "#c9d6ea"

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"

[theme]
base = "dark"
primaryColor = "#60a5fa"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#111827"
textColor = "#e2e8f0"
borderColor = "#334155"
baseRadius = "0.75rem"
buttonRadius = "0.75rem"
showWidgetBorder = true
showSidebarBorder = true

[theme.sidebar]
primaryColor = "#60a5fa"
backgroundColor = "#020617"
secondaryBackgroundColor = "#111827"
textColor = "#e2e8f0"
borderColor = "#334155"
showWidgetBorder = true

[theme.dark]
primaryColor = "#60a5fa"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#111827"
textColor = "#e2e8f0"
borderColor = "#334155"

[theme.dark.sidebar]
primaryColor = "#60a5fa"
backgroundColor = "#020617"
secondaryBackgroundColor = "#111827"
textColor = "#e2e8f0"
borderColor = "#334155"

[theme.light]
primaryColor = "#1d4ed8"
backgroundColor = "#f3f6fb"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
borderColor = "#cbd5e1"

[theme.light.sidebar]
